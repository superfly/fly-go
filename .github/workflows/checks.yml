name: Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-$${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: j178/prek-action@v2.0.4
        with:
          extra-args: --all-files --stage=manual

  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          # Keep golangci-lint version insync with .pre-commit-config.yaml
          version: v2.11.3
          # pkg/clientsignals is a nested module (its own go.mod) and
          # is not covered by the default ./... pattern.
          args: ./... ./pkg/clientsignals/...

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Get go version
        id: go-version
        run: echo "name=version::$(go env GOVERSION)" >> $GITHUB_OUTPUT
      - name: go mod download
        run: go mod download
      - name: go mod verify
        run: go mod verify
      - name: generate command strings
        run: go generate ./... && git diff --exit-code
        if: runner.os != 'Windows'
      - name: Run tests
        run: go test ./...
      - name: Run pkg/clientsignals tests
        # pkg/clientsignals is a nested module (its own go.mod) and is
        # not covered by go test ./... above.
        working-directory: pkg/clientsignals
        run: go test ./...
